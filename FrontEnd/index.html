<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCUBA-DOO</title>
  <link rel="icon" type="image/jpeg" href="Sea.jpg">
  <link rel="stylesheet" href="style.css">

  <!-- Open Graph — controls the preview card when sharing the link on WhatsApp, Discord, LinkedIn etc. -->
  <meta property="og:title"       content="Scuba-Doo — Predictive Dive Safety Analysis">
  <meta property="og:description" content="Get real-time dive safety verdicts, wetsuit recommendations, marine life forecasts, and ear pressure advice powered by ML.">
  <meta property="og:image"       content="https://scuba-doo.netlify.app/Sea.jpg">
  <meta property="og:url"         content="https://scuba-doo.netlify.app">
  <meta property="og:type"        content="website">

  <!-- Twitter / X card (uses same Sea.jpg) -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Scuba-Doo — Predictive Dive Safety Analysis">
  <meta name="twitter:description" content="Real-time dive safety powered by ML.">
  <meta name="twitter:image"       content="https://scuba-doo.netlify.app/Sea.jpg">
</head>
<body>

  <!-- PAGE 1 -->
  <section class="section hero">
    <div class="hero-text">WELCOME TO SCUBA-DOO!! 🐠 🤿</div>
  </section>

  <!-- PAGE 2 -->
  <section class="section form-section">
    <div class="form-box">

      <div class="form-row">
        <div class="form-label">LOCATION OF YOUR DIVE</div>
        <select id="location">
          <option value="">-- Select Dive Location --</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-label">DATE</div>
        <input type="date" id="day">
      </div>

      <div class="form-row">
        <div class="form-label">TIME</div>
        <input type="time" id="time">
      </div>

      <button class="submit-btn" id="submitBtn">Submit</button>
      <div id="loader" class="loader" style="display: none;"></div>

      <div id="result-container" style="display: none;">
        <div id="result-text"></div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
